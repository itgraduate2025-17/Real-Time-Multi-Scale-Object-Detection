<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Object Detection</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        
           background-image:
    url('/static/images/pattern2.png'),
    linear-gradient(135deg, #1B1035 0%, #2A174E 100%);
     background-repeat: no-repeat, no-repeat;
     background-position: center center, center center;
      background-size: cover, cover;
      background-blend-mode: overlay;
        margin: 0;
        padding: 0;
      }

      #heading {
        color: rgb(225, 222, 230);
        font-weight: 700;
        font-size: 40px;
        text-align: center;
        margin: 2rem 0;
      }

      .live-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding-top: calc(
          20px + 1rem
        ); /* Adjusted to match navbar height + additional padding */
        box-sizing: border-box; /* Ensures padding calculation includes total height */
      }

      .live-container h1 {
        color: rgb(54, 3, 112);
        font-weight: 700;
        margin-top: 30px;
      }

      .live-content {
        max-width: 1200px;
        padding: 1rem;
        text-align: center;
        background: #09012e;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(190, 2, 2, 0.1);
        margin: 2rem 0;
      }

      .live-content img {
        max-width: 100%;
        border-radius: 10px;
        margin: 1rem 0;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .live-content .button {
        display: inline-block;
        background: linear-gradient(to right, #6C9BFF, #8A63F8);
        color: #fff;
        padding: 0.75rem 1.5rem;
        margin: 1rem 0;
        border: none;
        border-radius: 5px;
        text-decoration: none;
        font-size: 1rem;
        transition: background-color 0.3s ease, transform 0.3s ease;
      }

      .live-content .button:hover {
        background-color: #0056b3;
        transform: translateY(-3px);
      }

      
      .container {
        margin: 2rem auto;
        max-width: 800px;
        padding: 0 1rem;
      }
    </style>
  </head>
  <body>
   
    <div class="live-container">
      <h1 id="heading">Live Object Detection</h1>
      <div class="live-content">
        <img src="{{ url_for('video_feed') }}" alt="Live Detection" />
        <a href="/" class="button">Go Back</a>
      </div>
    </div>
  </body>
</html>
